services:
  postgres:
    image: postgres:16-alpine
    container_name: misschili-db
    environment:
      POSTGRES_DB: misschili
      POSTGRES_USER: misschili
      POSTGRES_PASSWORD: misschili_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U misschili"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
