services:
  mariadb:
    image: mariadb:11
    container_name: misschili-db
    environment:
      MARIADB_DATABASE: misschili
      MARIADB_USER: misschili
      MARIADB_PASSWORD: misschili_dev_2024
      MARIADB_ROOT_PASSWORD: misschili_dev_2024
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysqldata:
